name: Weibo Check-in

on:
  workflow_dispatch:
  schedule:
    - cron: "30 22 * * *"

permissions:
  contents: read

jobs:
  checkin:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Install dependencies
        run: uv sync

      - name: Create account config
        env:
          WEIBO_ACCOUNTS_JSON: ${{ secrets.WEIBO_ACCOUNTS_JSON }}
        run: |
          if [ -z "${WEIBO_ACCOUNTS_JSON}" ]; then
            echo "::error::Missing WEIBO_ACCOUNTS_JSON repository secret"
            exit 1
          fi
          printf '%s' "${WEIBO_ACCOUNTS_JSON}" > accounts.json

      - name: Run check-in
        run: uv run python -m weibo_auto_signin.cli --config accounts.json
