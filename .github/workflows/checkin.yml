name: Weibo Check-in

on:
  workflow_dispatch:
  schedule:
    - cron: "30 22 * * *"

permissions:
  contents: read

jobs:
  checkin:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Install dependencies
        run: uv sync

      - name: Create cookie config
        env:
          WEIBO_COOKIES: ${{ secrets.WEIBO_COOKIES }}
        run: |
          if [ -z "${WEIBO_COOKIES}" ]; then
            echo "::error::Missing WEIBO_COOKIES repository secret"
            exit 1
          fi
          printf '%s' "${WEIBO_COOKIES}" > cookies.txt

      - name: Run check-in
        run: uv run python -m weibo_auto_signin.cli --config cookies.txt
