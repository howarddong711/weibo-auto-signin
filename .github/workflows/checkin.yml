name: Weibo Check-in

on:
  workflow_dispatch:
  schedule:
    - cron: "0 22 * * *"

permissions:
  contents: read

concurrency:
  group: checkin
  cancel-in-progress: false

jobs:
  checkin:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Install dependencies
        run: uv sync

      - name: Create cookie config
        env:
          WEIBO_COOKIES: ${{ secrets.WEIBO_COOKIES }}
        run: |
          if [ -z "${WEIBO_COOKIES}" ]; then
            echo "::error::Missing WEIBO_COOKIES repository secret"
            exit 1
          fi
          printf '%s' "${WEIBO_COOKIES}" > cookies.txt

      - name: Run check-in
        env:
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          SMTP_TO: ${{ secrets.SMTP_TO }}
          SMTP_USE_TLS: ${{ secrets.SMTP_USE_TLS }}
          NOTIFY_TITLE_PREFIX: ${{ secrets.NOTIFY_TITLE_PREFIX }}
        run: uv run python -m weibo_auto_signin.cli --config cookies.txt
